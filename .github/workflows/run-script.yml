name: ConnectWise Ticket Automation

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CW_BASE_URL: ${{ secrets.CW_BASE_URL }}
      CW_PUBLIC_KEY: ${{ secrets.CW_PUBLIC_KEY }}
      CW_PRIVATE_KEY: ${{ secrets.CW_PRIVATE_KEY }}
      CW_CLIENT_ID: ${{ secrets.CW_CLIENT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin main --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run script
        run: python script.py

      - name: Commit & Push if changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add tickets.csv last_run.txt || true

          git diff --cached --quiet || git commit -m "Auto update tickets data"
          git push
