name: Run Ticket Script

on:
  schedule:
    - cron: '*/5 * * * *'   # Runs daily at 8:00 AM IST (2:30 AM UTC)
  workflow_dispatch:   
  # Allows manual trigger
permissions:
  contents: write
  
jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      CW_BASE_URL: ${{ secrets.CW_BASE_URL }}
      CW_PUBLIC_KEY: ${{ secrets.CW_PUBLIC_KEY }}
      CW_PRIVATE_KEY: ${{ secrets.CW_PRIVATE_KEY }}
      CW_CLIENT_ID: ${{ secrets.CW_CLIENT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Python script
        run: |
          python script.py

      # ✅ Persist CSV (IMPORTANT)
      - name: Commit and push CSV if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add tickets.csv
          
          git diff --cached --quiet || git commit -m "Auto-update tickets CSV"
          git push
